<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案件手配BOX｜FIVE-STAR JAPAN</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --bg: #07090f;
    --bg2: rgba(22, 27, 39, 0.65);
    --bg3: rgba(30, 37, 53, 0.7);
    --main: #4a7dff;
    --main-glow: rgba(74, 125, 255, 0.35);
    --main2: #2d5fd4;
    --accent: #5ee8a6;
    --accent-glow: rgba(94, 232, 166, 0.3);
    --warn: #ffb463;
    --danger: #ff5c5c;
    --text: #f0f3f9;
    --text2: #8a9ab5;
    --border: rgba(255, 255, 255, 0.08);
    --border-2: rgba(255, 255, 255, 0.14);
    --radius: 12px;
    --radius-sm: 8px;
    --ease: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background:
      radial-gradient(ellipse 60% 50% at 15% 0%, rgba(74, 125, 255, 0.12), transparent 70%),
      radial-gradient(ellipse 50% 40% at 90% 10%, rgba(94, 232, 166, 0.06), transparent 70%),
      radial-gradient(ellipse 70% 40% at 50% 100%, rgba(74, 125, 255, 0.04), transparent 70%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }

  /* ヘッダー */
  header {
    position: relative;
    background:
      linear-gradient(135deg, rgba(74, 125, 255, 0.12) 0%, transparent 60%),
      linear-gradient(180deg, rgba(20, 28, 48, 0.8) 0%, rgba(10, 12, 20, 0.4) 100%);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    overflow: hidden;
  }
  header .logo, header .header-text { position: relative; z-index: 2; }

  .logo {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, #5a87d0 0%, #3a5fa0 100%);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 5px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
  }

  .header-text h1 {
    font-size: 17px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: 0.01em;
    background: linear-gradient(135deg, #f0f3f9 0%, #c8d2e6 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-text h1 .ver {
    font-size: 10px;
    font-weight: 600;
    color: var(--text2);
    -webkit-text-fill-color: var(--text2);
    margin-left: 8px;
    letter-spacing: 0.12em;
    vertical-align: middle;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .header-text p {
    font-size: 11px;
    color: var(--text2);
    margin-top: 3px;
    letter-spacing: 0.04em;
  }

  .status-badge {
    background: rgba(94, 232, 166, 0.12);
    border: 1px solid rgba(94, 232, 166, 0.3);
    color: var(--accent);
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 600;
    white-space: nowrap;
    letter-spacing: 0.03em;
  }
  .status-badge.loading { animation: breathe 1.8s ease-in-out infinite; }
  @keyframes breathe {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.02); }
  }

  .input-label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }
  .input-label-row .section-label { margin-bottom: 0; }

  .result-count {
    margin-top: 10px;
    text-align: right;
    font-size: 11px;
    color: var(--text2);
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .result-count .num {
    color: var(--accent);
    font-weight: 800;
    font-size: 15px;
    margin: 0 2px;
    font-variant-numeric: tabular-nums;
  }

  /* ナビ一覧 */
  .nav-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 14px;
  }
  .nav-list:empty { display: none; }

  .nav-item {
    display: flex;
    align-items: stretch;
    background: var(--bg2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    transition: all var(--ease);
  }
  .nav-item:hover {
    border-color: var(--main);
    transform: translateY(-1px);
  }

  .nav-btn {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    padding: 7px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px 10px;
    white-space: nowrap;
    text-align: left;
  }
  .nav-delete { flex-shrink: 0; }

  @media (max-width: 600px) {
    .nav-btn { padding: 6px 10px; gap: 5px 8px; }
    .nav-btn .nav-room { margin-left: 0; }
  }
  .nav-btn:hover { background: var(--bg3); }
  .nav-case {
    color: var(--accent);
    font-weight: 800;
    background: rgba(94, 232, 166, 0.15);
    padding: 4px 11px;
    border-radius: 6px;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
  }
  .nav-name { font-size: 12px; }
  .nav-pref { color: var(--text2); font-size: 11px; }
  .nav-genre {
    background: var(--bg3);
    color: var(--text2);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.02em;
  }
  .nav-genre.st { background: rgba(240, 160, 75, 0.2); color: var(--warn); }
  .nav-btn .nav-room {
    margin-left: auto;
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }
  .nav-btn .nav-room.fsj-hachi { color: var(--warn); }
  .nav-btn .nav-room.transit { color: #7ea8e0; }

  .nav-delete {
    background: transparent;
    border: none;
    border-left: 1px solid var(--border);
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 0 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .nav-delete:hover {
    background: rgba(224, 92, 92, 0.15);
    color: var(--danger);
  }

  .status-badge.loading {
    background: rgba(86, 122, 185, 0.15);
    border-color: rgba(86, 122, 185, 0.3);
    color: #7ea8e0;
  }
  .status-badge.error {
    background: rgba(240, 160, 75, 0.15);
    border-color: rgba(240, 160, 75, 0.35);
    color: var(--warn);
  }

  /* メインレイアウト */
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 20px 0;
  }

  /* 入力セクション */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::before {
    content: '';
    display: block;
    width: 3px;
    height: 12px;
    background: linear-gradient(180deg, var(--main) 0%, var(--accent) 100%);
    border-radius: 2px;
  }

  textarea {
    width: 100%;
    background: var(--bg2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Noto Sans JP', monospace;
    font-size: 13.5px;
    line-height: 1.7;
    padding: 16px;
    resize: vertical;
    transition: all var(--ease);
    min-height: 180px;
  }

  textarea:focus {
    outline: none;
    border-color: var(--main);
    background: var(--bg3);
  }

  textarea::placeholder { color: var(--text2); }

  /* iOS Safariのタップ時自動ズーム防止（font-size 16px以上でズームされない） */
  @media (max-width: 600px) {
    textarea { font-size: 16px; }
  }

  /* ボタン */
  .btn-group {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all var(--ease);
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.04em;
  }

  .btn-primary {
    background: linear-gradient(135deg, #5a8bff 0%, #3562d4 100%);
    color: white;
    flex: 1;
    font-size: 16px;
    padding: 15px 28px;
    justify-content: center;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    background: linear-gradient(135deg, #6b98ff 0%, #3f6be0 100%);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-clear {
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
  }

  .btn-clear:hover { border-color: var(--border-2); color: var(--text); background: rgba(30, 37, 53, 0.9); }

  .btn-primary:disabled {
    background: linear-gradient(135deg, rgba(60, 70, 95, 0.6) 0%, rgba(40, 50, 75, 0.6) 100%);
    color: var(--text2);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }
  .btn-primary:disabled::before { display: none; }
  .btn-primary:disabled:hover { transform: none; box-shadow: none; }

  /* 出力エリア */
  .output-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    padding: 14px;
  }

  @media (max-width: 600px) {
    .output-grid { grid-template-columns: 1fr; }
  }

  .output-card {
    background: var(--bg3);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    transition: border-color var(--ease);
  }
  .output-card:hover { border-color: var(--border-2); }

  .output-card-header {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, transparent 100%);
  }

  .output-card-title {
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .badge {
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 5px;
    font-weight: 800;
    letter-spacing: 0.08em;
  }

  .badge-first {
    background: rgba(122, 164, 232, 0.18);
    color: #a5c4ef;
    border: 1px solid rgba(122, 164, 232, 0.3);
  }

  .badge-second {
    background: rgba(94, 232, 166, 0.15);
    color: var(--accent);
    border: 1px solid rgba(94, 232, 166, 0.3);
  }

  .badge-dest {
    font-size: 10px;
    color: var(--text2);
  }

  .btn-copy {
    background: rgba(30, 37, 53, 0.5);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all var(--ease);
    display: flex;
    align-items: center;
    gap: 5px;
    letter-spacing: 0.04em;
  }

  .btn-copy:hover {
    border-color: var(--main);
    color: var(--main);
    background: rgba(74, 125, 255, 0.08);
  }
  .btn-copy.copied {
    background: rgba(94, 232, 166, 0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .output-text {
    padding: 14px;
    font-size: 13px;
    line-height: 1.9;
    white-space: pre-wrap;
    word-break: break-all;
    min-height: 100px;
    max-height: 150px;
    overflow-y: auto;
    color: var(--text);
  }

  .output-text::-webkit-scrollbar { width: 8px; }
  .output-text::-webkit-scrollbar-track { background: var(--bg3); border-radius: 4px; }
  .output-text::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .output-text::-webkit-scrollbar-thumb:hover { background: var(--text2); }

  /* 結果ヘッダー（ナビ項目と同じデザイン） */
  .result-header {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    border-radius: 0;
    padding: 10px 14px;
    margin-bottom: 0;
  }
  .result-header .room-badge { margin-left: auto; }

  .result-header .btn-delete {
    background: transparent;
    border: none;
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .result-header .btn-delete:hover { background: rgba(224, 92, 92, 0.15); color: var(--danger); }

  .room-badge {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .room-badge.fsj-hachi { color: var(--warn); }
  .room-badge.transit { color: #7ea8e0; }

  /* エラー・警告 */
  .alert {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12px;
    margin-top: 12px;
    display: none;
  }

  .block-alert {
    background: rgba(240, 160, 75, 0.12);
    border: 1px solid rgba(240, 160, 75, 0.35);
    color: var(--warn);
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.6;
    margin: 12px 14px 0;
  }

  .alert-warn {
    background: rgba(240, 160, 75, 0.12);
    border: 1px solid rgba(240, 160, 75, 0.3);
    color: var(--warn);
  }

  .alert-error {
    background: rgba(224, 92, 92, 0.12);
    border: 1px solid rgba(224, 92, 92, 0.3);
    color: var(--danger);
  }

  /* ST連絡メール出力 */
  .output-full { padding: 14px; }
  .output-full .output-card { width: 100%; position: relative; }
  .output-full .output-text { padding-right: 80px; }
  .btn-copy.st-copy {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 2;
  }

  .badge-st {
    background: rgba(240, 160, 75, 0.2);
    color: var(--warn);
    border: 1px solid rgba(240, 160, 75, 0.3);
  }

  .result-block {
    margin-top: 20px;
    padding: 0;
    background: var(--bg2);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: all var(--ease);
    scroll-margin-top: 16px;
    box-shadow: 0 8px 30px -12px rgba(0, 0, 0, 0.6);
  }
  .result-block:hover { border-color: var(--border-2); }
  .result-block.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 8px 30px -12px rgba(0, 0, 0, 0.6);
  }

  /* ====== ドット絵の夜空（test.html 限定・2pxピクセル統一） ====== */
  .skybox {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 52%;
    max-width: 620px;
    min-width: 160px;
    background: linear-gradient(180deg, #0a0e24 0%, #1a1f4a 55%, #3a2458 100%);
    overflow: hidden;
    image-rendering: pixelated;
    -webkit-font-smoothing: none;
    pointer-events: none;
    z-index: 1;
    -webkit-mask-image: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.35) 5%, #000 18%);
    mask-image: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.35) 5%, #000 18%);
  }

  /* クリックで反応する天体 */
  .sky-item.ev-planet, .sky-item.ev-saturn { pointer-events: auto; cursor: pointer; }

  /* スマホ: 夜空が全画面の背景。タイトルはそのまま最前面 */
  @media (max-width: 600px) {
    .skybox {
      left: 0;
      right: 0;
      width: auto;
      max-width: none;
      min-width: 0;
      -webkit-mask-image: none;
      mask-image: none;
    }
    header { padding: 16px 14px; gap: 10px; }
  }
  .sky-layer { position: absolute; inset: 0; pointer-events: none; }
  .sky-layer svg, .pixel-svg { display: block; shape-rendering: crispEdges; image-rendering: pixelated; }

  .horizon-svg {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    width: 100%; height: 30px;
    z-index: 1;
  }
  @media (max-width: 600px) {
    .horizon-svg { height: 36px; }
    header { min-height: 100px; }
  }

  .sky-count {
    position: absolute;
    top: 8px;
    right: 12px;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: rgba(255, 255, 255, 0.75);
    letter-spacing: 0;
    z-index: 3;
    line-height: 1;
  }
  .sky-count b {
    color: #ffe9ad;
    font-size: 10px;
    font-weight: normal;
    margin-left: 6px;
  }

  /* 常駐twinkle星（2x2の1ピクセル） */
  .tiny-star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #fff;
    animation: tinyTwinkle 3s infinite ease-in-out;
  }
  @keyframes tinyTwinkle {
    0%, 100% { opacity: 0.2; }
    50%      { opacity: 1; }
  }

  /* ユーザー生成の星（ピクセルクロス・ブラー無し） */
  .star-dot {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #fff;
    box-shadow:
      -2px 0 0 #fff, 2px 0 0 #fff,
      0 -2px 0 #fff, 0 2px 0 #fff;
    animation: starPop 0.5s steps(3, end), starPulse 2.4s steps(2, jump-none) 0.5s infinite;
  }
  .star-dot.c-y { background: #ffe88d; box-shadow: -2px 0 0 #ffe88d, 2px 0 0 #ffe88d, 0 -2px 0 #ffe88d, 0 2px 0 #ffe88d; }
  .star-dot.c-b { background: #9ecfff; box-shadow: -2px 0 0 #9ecfff, 2px 0 0 #9ecfff, 0 -2px 0 #9ecfff, 0 2px 0 #9ecfff; }
  .star-dot.c-p { background: #ffb4e6; box-shadow: -2px 0 0 #ffb4e6, 2px 0 0 #ffb4e6, 0 -2px 0 #ffb4e6, 0 2px 0 #ffb4e6; }
  @keyframes starPop {
    0%   { transform: scale(0); }
    100% { transform: scale(1); }
  }
  @keyframes starPulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.5; }
  }

  /* イベント配置（共通） */
  .sky-item {
    position: absolute;
    z-index: 2;
  }
  .sky-item.persistent { z-index: 1; }

  /* 登場アニメ（ステップで弾む） */
  @keyframes popIn {
    0%   { transform: translateY(16px) scale(0); opacity: 0; }
    40%  { transform: translateY(-4px) scale(1); opacity: 1; }
    70%  { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  @keyframes softBob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-2px); }
  }

  /* 流れ星（真横に流れる）・彗星（斜めに） */
  .ev-shoot {
    left: -30px;
    animation: shootMoveHoriz 1.4s steps(14, end) forwards;
  }
  .ev-comet {
    left: -60px;
    top: 12px;
    animation: shootMove 2.2s steps(18, end) forwards;
  }
  @keyframes shootMoveHoriz {
    0%   { transform: translate(0, 0); }
    100% { transform: translate(calc(100vw + 640px), 0); }
  }
  @keyframes shootMove {
    0%   { transform: translate(0, 0); }
    100% { transform: translate(calc(100vw + 640px), 40px); }
  }

  /* 航空障害灯点滅 */
  .nyc-beacon { animation: beaconBlink 1.4s steps(2, jump-none) infinite; }
  @keyframes beaconBlink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.15; }
  }

  /* 月/惑星/土星 浮遊 */
  .ev-moon, .ev-planet, .ev-saturn {
    animation: popIn 0.8s steps(5, end), softBob 4s steps(4, jump-none) 0.8s infinite;
  }

  /* オーロラ */
  .ev-aurora {
    top: 0; left: 0; right: 0;
    height: 40px;
    opacity: 0;
    animation: auroraIn 1.5s ease-out forwards, auroraShimmer 4s steps(6, jump-none) 1.5s infinite;
  }
  .ev-aurora svg { width: 100%; height: 100%; }
  @keyframes auroraIn {
    to { opacity: 0.7; }
  }
  @keyframes auroraShimmer {
    0%, 100% { opacity: 0.55; }
    25%      { opacity: 0.8; }
    50%      { opacity: 0.7; }
    75%      { opacity: 0.6; }
  }

  /* 星座 */
  .ev-constellation {
    animation: popIn 1s steps(4, end);
  }
  .ev-constellation svg { overflow: visible; }

  /* UFO + アブダクション（--ufo-hover-x をJSで設定） */
  .ev-ufo {
    left: -30px;
    top: 18%;
    --ufo-hover-x: 240px;
    animation: ufoAbduct 10s steps(40) forwards;
  }
  @keyframes ufoAbduct {
    0%   { transform: translate(0, 0); }
    22%  { transform: translate(calc(var(--ufo-hover-x) - 80px), -6px); }
    30%  { transform: translate(calc(var(--ufo-hover-x) - 20px), -2px); }
    35%, 62% { transform: translate(var(--ufo-hover-x), 0); }
    68%  { transform: translate(calc(var(--ufo-hover-x) + 30px), -6px); }
    100% { transform: translate(calc(100vw + 640px), 4px); }
  }
  .ufo-beam-long {
    position: absolute;
    left: 12px;
    top: 13px;
    width: 6px;
    height: 60px;
    background: linear-gradient(180deg, #aef0ff 0%, #aef0ff 70%, transparent 100%);
    transform-origin: top center;
    transform: translateX(-50%) scaleY(0);
    animation: beamLong 10s steps(20) forwards;
  }
  @keyframes beamLong {
    0%, 32%  { transform: translateX(-50%) scaleY(0); }
    38%, 62% { transform: translateX(-50%) scaleY(1); }
    66%, 100% { transform: translateX(-50%) scaleY(0); }
  }
  .ufo-person {
    position: absolute;
    left: 12px;
    top: 0;
    transform: translate(-50%, 62px);
    opacity: 0;
    animation: personAbduct 10s steps(20) forwards;
  }
  @keyframes personAbduct {
    0%, 36%  { opacity: 0; transform: translate(-50%, 62px); }
    40%      { opacity: 1; transform: translate(-50%, 62px); }
    58%      { opacity: 1; transform: translate(-50%, 16px); }
    62%      { opacity: 0; transform: translate(-50%, 12px); }
    100%     { opacity: 0; transform: translate(-50%, 12px); }
  }

  /* 爆発の破片 */
  .explosion-shard {
    position: absolute;
    width: 2px;
    height: 2px;
    pointer-events: none;
    animation: explodeShard 1.2s steps(12) forwards;
  }
  @keyframes explodeShard {
    0%   { transform: translate(0, 0) scale(1.5); opacity: 1; }
    60%  { opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0.4); opacity: 0; }
  }

  /* 雲 */
  .ev-cloud {
    left: -60px;
    animation: drift 22s linear forwards;
  }
  @keyframes drift {
    from { transform: translateX(0); }
    to   { transform: translateX(calc(100% + 640px)); }
  }

  /* 鳥 */
  .ev-bird {
    left: -20px;
    animation: birdFly 10s steps(20, jump-none) forwards;
  }
  @keyframes birdFly {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(25%, -8px); }
    50%  { transform: translate(50%, 0); }
    75%  { transform: translate(75%, -6px); }
    100% { transform: translate(calc(100% + 640px), 4px); }
  }

  /* 花火 */
  .ev-fw {
    width: 2px; height: 2px;
    pointer-events: none;
  }
  .ev-fw span {
    position: absolute;
    left: 0; top: 0;
    width: 2px; height: 2px;
    background: currentColor;
    animation: fwPart 1.2s steps(14, end) forwards;
  }
  @keyframes fwPart {
    0%   { transform: translate(0, 0) scale(1.2); opacity: 1; }
    60%  { opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0.4); opacity: 0; }
  }
  .fw-flash {
    position: absolute;
    width: 6px; height: 6px;
    pointer-events: none;
    animation: fwFlash 0.4s steps(4, end) forwards;
  }
  @keyframes fwFlash {
    0%   { transform: translate(-50%, -50%) scale(0.2); opacity: 1; }
    40%  { transform: translate(-50%, -50%) scale(4); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
  }
  .fw-sparkle {
    position: absolute;
    width: 2px; height: 2px;
    pointer-events: none;
    animation: fwSparkle 1.4s steps(12, end) forwards;
  }
  @keyframes fwSparkle {
    0%   { transform: translate(0, 0); opacity: 0; }
    15%  { opacity: 1; }
    55%  { opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)); opacity: 0; }
  }

  /* 土星爆発 */
  .saturn-flash {
    position: absolute;
    width: 12px; height: 12px;
    pointer-events: none;
    background: #fff;
    animation: satFlash 0.5s steps(6, end) forwards;
  }
  @keyframes satFlash {
    0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
    25%  { transform: translate(-50%, -50%) scale(3); opacity: 1; background: #fff; }
    55%  { transform: translate(-50%, -50%) scale(5); opacity: 0.8; background: #ffe88d; }
    100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
  }
  .shock-pixel {
    position: absolute;
    width: 4px; height: 4px;
    pointer-events: none;
    background: #ffe88d;
    animation: shockOut 0.9s steps(10, end) forwards;
  }
  @keyframes shockOut {
    0%   { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    80%  { opacity: 0.8; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.4); opacity: 0; }
  }

  /* 流星群 */
  .ev-shower { left: -30px; top: 10%; animation: shootMove 1.6s steps(16, end) forwards; }

  /* 気球 */
  .ev-balloon {
    bottom: -40px;
    animation: floatUp 12s steps(40, jump-none) forwards;
  }
  @keyframes floatUp {
    0%   { transform: translate(0, 0); }
    100% { transform: translate(30px, -260px); }
  }

  /* ロケット */
  .ev-rocket {
    bottom: 20px;
    animation: rocketUp 3.5s cubic-bezier(0.5, 0, 0.3, 1) forwards;
  }
  @keyframes rocketUp {
    0%   { transform: translate(0, 0); }
    100% { transform: translate(40px, -260px); opacity: 0; }
  }

  /* 衛星 */
  .ev-sat {
    left: -10px;
    animation: drift 18s linear forwards;
  }

  /* ネコ */
  .ev-cat {
    bottom: 30px;
    left: -20px;
    animation: catWalk 12s steps(30, jump-none) forwards;
  }
  @keyframes catWalk {
    from { transform: translateX(0); }
    to   { transform: translateX(calc(100% + 640px)); }
  }

  /* 蛍 */
  .ev-firefly-group { position: absolute; inset: 0; }
  .ev-firefly {
    position: absolute;
    width: 2px; height: 2px;
    background: #d6ff7a;
    box-shadow: -2px 0 0 rgba(214, 255, 122, 0.6), 2px 0 0 rgba(214, 255, 122, 0.6);
    animation: fireflyFloat 6s steps(12, jump-none) infinite, fireflyBlink 1.2s steps(2, jump-none) infinite;
  }
  @keyframes fireflyFloat {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(20px, -10px); }
    50%  { transform: translate(-15px, 5px); }
    75%  { transform: translate(10px, 8px); }
    100% { transform: translate(0, 0); }
  }
  @keyframes fireflyBlink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }

  @media (max-width: 600px) {
    .skybox { height: 180px; }
  }

  /* アニメ */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideInUp {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .output-card { animation: fadeIn 0.25s ease; }
  .result-block { animation: slideInUp 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
  .nav-item { animation: slideInUp 0.25s cubic-bezier(0.4, 0, 0.2, 1); }

  /* スクロールバー全体 */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.15); }
</style>

<script>
// ===== 設定（スプシから毎回読込） =====
const CONFIG_URL_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTm4r22K3RuIT2ZXbf8jNyoOz-Ar_dj-Ue9EFDs03Z4XS62Ql2xQ1--TYE6-e4H_HSW12KPMtoc8AMq/pub';
const CONFIG_GIDS = {
  area:    1379687041,  // 都道府県 → エリア
  genre:   2096605256,  // ジャンル → ヘッダー/ラベル
  site:    432300628,   // サイト名 → 簡略名
  room:    1722473426,  // エリア → ルーム名
  hachiPref: 1852757795 // FSJハチ対象県
};

// スプシから読込（読込前は空。読込失敗時はgenerateボタン無効のまま）
let AREA_MAP = {};
let GENRE_HEADER = {};
let GENRE_LABEL = {};
let SITE_NAME_MAP = {};
let ROOM_MAP = {};
let FSJ_HACHI_PREFS = [];

// ===== CSV取得＆パース =====
function parseCSV(text) {
  // タイトル行(■...)と列ヘッダー行をスキップして、データ行だけ返す
  const lines = text.replace(/\r\n/g,'\n').trim().split('\n');
  const rows = [];
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (!line.trim()) continue;
    // タイトル行(■で始まる)、列ヘッダー行(1行目または2行目)はスキップ
    if (i < 2) continue;
    rows.push(line.split(',').map(c => c.trim()));
  }
  return rows;
}

async function fetchCSV(gid) {
  const url = `${CONFIG_URL_BASE}?gid=${gid}&single=true&output=csv&t=${Date.now()}`;
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.text();
}

async function loadConfig() {
  const badge = document.getElementById('statusBadge');
  try {
    const [areaTxt, genreTxt, siteTxt, roomTxt, hachiTxt] = await Promise.all([
      fetchCSV(CONFIG_GIDS.area),
      fetchCSV(CONFIG_GIDS.genre),
      fetchCSV(CONFIG_GIDS.site),
      fetchCSV(CONFIG_GIDS.room),
      fetchCSV(CONFIG_GIDS.hachiPref),
    ]);

    AREA_MAP = {};
    parseCSV(areaTxt).forEach(r => { if (r[0] && r[1]) AREA_MAP[r[0]] = r[1]; });

    GENRE_HEADER = {};
    GENRE_LABEL = {};
    parseCSV(genreTxt).forEach(r => {
      if (!r[0]) return;
      if (r[1]) GENRE_HEADER[r[0]] = r[1];
      if (r[2]) GENRE_LABEL[r[0]]  = r[2];
    });

    SITE_NAME_MAP = {};
    parseCSV(siteTxt).forEach(r => { if (r[0]) SITE_NAME_MAP[r[0]] = r[1] || r[0]; });

    // ルーム: A=ルーム名, B=エリア, C=グループID → エリア→ルーム名
    ROOM_MAP = {};
    parseCSV(roomTxt).forEach(r => { if (r[0] && r[1]) ROOM_MAP[r[1]] = r[0]; });

    // FSJハチ対象県: A列=都道府県
    FSJ_HACHI_PREFS = parseCSV(hachiTxt).map(r => r[0]).filter(Boolean);

    badge.className = 'status-badge';
    badge.textContent = '✓ 設定同期済み';
    document.getElementById('generateBtn').disabled = false;
  } catch (e) {
    console.error('設定読込失敗:', e);
    badge.className = 'status-badge error';
    badge.textContent = '⚠ 設定読込失敗';
    badge.title = String(e);
  }
}

window.addEventListener('DOMContentLoaded', loadConfig);

// ===== ヘルパー =====
function extract(text, start, end) {
  const s = text.indexOf(start);
  if (s === -1) return '';
  const si = s + start.length;
  const e = end ? text.indexOf(end, si) : -1;
  return (e === -1 ? text.substring(si) : text.substring(si, e)).trim();
}

function extractMulti(text, starts, ends) {
  for (let i = 0; i < starts.length; i++) {
    const r = extract(text, starts[i], ends[i] || '\n');
    if (r) return r;
  }
  return '';
}

function getArea(address) {
  for (const [pref, area] of Object.entries(AREA_MAP)) {
    if (address.includes(pref)) return area;
  }
  return 'その他';
}

function getHeader(genre) {
  for (const [kw, h] of Object.entries(GENRE_HEADER)) {
    if (genre.includes(kw)) return h;
  }
  return '未分類';
}

function getGenreLabel(genre) {
  for (const [kw, l] of Object.entries(GENRE_LABEL)) {
    if (genre.includes(kw)) return l;
  }
  return genre;
}

function simplifySiteName(siteName) {
  for (const [kw, s] of Object.entries(SITE_NAME_MAP)) {
    if (siteName.includes(kw)) return s;
  }
  return siteName;
}

function maskPhone(phone) {
  if (!phone || phone.length < 3) return phone;
  return phone.slice(0, -2);
}

function formatReceived(received) {
  return received
    .replace(/(\d{4})-(\d{2})-(\d{2})/, '$1/$2/$3')
    .replace(/(\d{2}:\d{2}):\d{2}$/, '$1');
}

function isSTMail(body) {
  return body.includes('シェアリングテクノロジー株式会社です。');
}

// ===== パース =====
function parseMailBody(body) {
  const caseNo = extractMulti(body, ['【案件番号：','■案件番号：'], ['】','\n']);
  if (!caseNo) return null;
  return {
    caseNo,
    received: extractMulti(body, ['■受取日時：','■受信日時：','■取次日時：'], ['\n','\n','\n']),
    deadline: extractMulti(body, ['■お客様への連絡期限：','【下記日時までに連絡必須】\n'], ['\n','\n']),
    siteName: extract(body, '■問合せ元サイト名：', '\n'),
    genre:    extract(body, '■ジャンル：', '\n'),
    name:     extractMulti(body, ['■お名前：','■名前：'], ['\n','\n']).replace(/ /g, '　'),
    address:  extract(body, '■住所：', '\n■'),
    phone:    extract(body, '■電話番号１：', '\n'),
    phone2:   extract(body, '■電話番号２：', '\n'),
    email:    extract(body, '■メールアドレス：', '\n'),
  };
}

// ===== ファースト生成 =====
function buildFirst(p) {
  const received = formatReceived(p.received);
  const datePart = received.split(' ')[0];
  const yyyy = datePart.split('/')[0];
  const displayAddress = p.address
    .replace(/〒\d{3}-?\d{4}/g, '')
    .replace(/〒\d+/g, '')
    .replace(/（[ァ-ヶー・\s]+）/g, '')
    .replace(/（以降は加盟店様へ伝達）/g, '')
    .replace(/（以降は加盟店へ伝達）/g, '')
    .replace(/（以降は加盟店様に伝達）/g, '')
    .replace(/\n/g, '')
    .trim();
  return `【案件種別】: ${getHeader(p.genre)}
【案件番号】: ${p.caseNo}
【案件取得日】: ${datePart}
【施工完了日】: ${yyyy}/  
【地域】: ${displayAddress}
【顧客名】: ${p.name}
【連絡先】: ${maskPhone(p.phone)}
【作業内容】: 
【施工金額[税込]】: 
【徴収方法】: 現金/クレカ/振込/保険/キャッシュレス
【案件担当者名】: `;
}

// ===== セカンド生成 =====
function buildSecond(body, p) {
  const received = formatReceived(p.received);
  const consultStartIdx = body.search(/[=＝]{3,}/);
  const consultEnd = body.indexOf('＜調査費');
  let consultBlock = '';
  if (consultStartIdx !== -1 && consultEnd !== -1) {
    consultBlock = body.substring(consultStartIdx, consultEnd).trim();
    consultBlock = consultBlock.replace(/[=＝]{3,}/g, '＝＝＝＝＝＝＝＝＝＝');
    consultBlock = consultBlock.replace(/■希望日時：(.+)/, '■希望日時：\n$1');
  }

  let situationBlock = '';
  const situationStart = body.indexOf('【状況】');
  const sitEndMarkers = ['【サイト別注意事項】','シェアリングテクノロジー','------------------------------------------','何卒よろしくお願い','案件詳細は下記URL'];
  let situationEnd = -1;
  if (situationStart !== -1) {
    for (const m of sitEndMarkers) {
      const idx = body.indexOf(m, situationStart);
      if (idx !== -1 && (situationEnd === -1 || idx < situationEnd)) situationEnd = idx;
    }
    if (situationEnd !== -1) situationBlock = '\n\n' + body.substring(situationStart, situationEnd).trim();
  }

  let siteNoteBlock = '';
  const siteNoteStart = body.indexOf('【サイト別注意事項】');
  const snEndMarkers = ['【下記日時までに連絡必須】','案件詳細は下記URL','------------------------------------------'];
  let siteNoteEnd = -1;
  if (siteNoteStart !== -1) {
    for (const m of snEndMarkers) {
      const idx = body.indexOf(m, siteNoteStart);
      if (idx !== -1 && (siteNoteEnd === -1 || idx < siteNoteEnd)) siteNoteEnd = idx;
    }
    if (siteNoteEnd !== -1) {
      siteNoteBlock = body.substring(siteNoteStart, siteNoteEnd).trim();
      siteNoteBlock = siteNoteBlock
        .replace(/▼ご報告方法はこちら[\s\S]*?https:\/\/bit\.ly\/\S+\n?/g, '')
        .replace(/[ \t]+\n/g, '\n')
        .replace(/\n{2,}/g, '\n')
        .trim();
      siteNoteBlock = '\n\n' + siteNoteBlock;
    }
  }

  return `■案件番号：${p.caseNo}

■受取日時：
${received}

■お客様への連絡期限：
${p.deadline}

■問合せ元サイト名：
${simplifySiteName(p.siteName)}

■ジャンル：
${getGenreLabel(p.genre)}(${p.genre})

■お名前：
${p.name}

■住所：
${p.address}

■電話番号１：${p.phone}
■電話番号２：${p.phone2}
■メールアドレス：${p.email}

${consultBlock}
＜調査費、キャンセル料、出張費が発生する場合：事前に必ずお客様にご説明・ご了承の上、請求してください＞${situationBlock}${siteNoteBlock}`;
}

// ===== ST連絡メール生成 =====
function buildSTMessage(body) {
  const caseNo = extractMulti(body, ['■案件番号：','■案件番号 ：'], ['\n','\n']);
  if (!caseNo) return null;
  const name = extractMulti(body, ['■お客様名：','■お客様名 ：'], ['\n','\n']);
  const request = extractMulti(body, ['■ご要件：','■ご要件 ：'], ['\n','\n']);
  const deadline = extract(body, '■連絡期限：', '\n');

  const descStart = body.indexOf('下記案件について');
  const descEnd = body.indexOf('■案件番号');
  let description = '';
  if (descStart !== -1 && descEnd !== -1) {
    description = body.substring(descStart, descEnd)
      .split('\n')
      .map(l => l.trim())
      .filter(l => l && !l.includes('ありがとうございました') && !l.includes('今後共') && !l.includes('まことに申し訳') && !l.includes('大変申し訳'))
      .join('')
      .trim();
  }

  let lines = ['【STより連絡あり】', ''];
  if (description) lines.push(description, '');
  lines.push(`■案件番号：${caseNo}`);
  if (name) lines.push(`■お客様名：${name}`);
  if (deadline) lines.push(`■連絡期限：${deadline}`);
  if (request) lines.push(`■ご要件：${request}`);
  lines.push('', '@', 'ご対応よろしくお願いいたします。');
  return lines.join('\n');
}

  // ST連絡メール
  if (isSTMail(body)) {

    const stCaseNo = extractMulti(body, ['■案件番号：','■案件番号 ：'], ['\n','\n']);

      showAlert(`案件番号 ${stCaseNo} が重複しております。ご確認ください。`, 'warn');

  const timeMatch = (parsed.received || '').match(/(\d{1,2}):(\d{2})/);

  if (timeMatch) {
    const rmin = parseInt(timeMatch[1], 10) * 60 + parseInt(timeMatch[2], 10);

  }

  const isHachi = parsed.genre.includes('ハチ');

  } else if (isHachiOffHours) {
    topRoom = areaRoom;
    firstDest = areaRoom;
    secondDest = '案件担当者';
    hachiWarnHtml = `<div class="block-alert">⚠️ このハチ案件は時間外のため、${areaRoom}（ファースト）と案件担当者（セカンド）へ送信してください。</div>`;

    firstDest = areaRoom;
    secondDest = '案件担当者';
  }
  const roomClass = isFsjHachiRoom ? 'room-badge fsj-hachi' : 'room-badge';

  const block = document.createElement('div');
  block.className = 'result-block';
  block.dataset.caseno = parsed.caseNo;
  const prefName = extractPref(parsed.address);
  const genreLabel = getHeader(parsed.genre);
  block.innerHTML = `
    <div class="result-header">
      <span class="nav-case">${parsed.caseNo}</span>
      ${genreLabel ? `<span class="nav-genre">${genreLabel}</span>` : ''}
      ${parsed.name ? `<span class="nav-name">${parsed.name}</span>` : ''}
      ${prefName ? `<span class="nav-pref">${prefName}</span>` : ''}
      <span class="${roomClass}">→ ${topRoom}</span>

    </div>
    ${hachiWarnHtml}
    <div class="output-grid">
      <div class="output-card">
        <div class="output-card-header">
          <div class="output-card-title">
            <span class="badge badge-first">FIRST</span>
            案件紹介
          </div>
          <button class="btn-copy" id="copyFirst${id}" onclick="copyTextById('firstOut${id}','copyFirst${id}')">${COPY_ICON} コピー</button>
        </div>
        <div id="firstOut${id}" class="output-text"></div>
      </div>
      <div class="output-card">
        <div class="output-card-header">
          <div class="output-card-title">
            <span class="badge badge-second">SECOND</span>
            案件詳細
          </div>
          <button class="btn-copy" id="copySecond${id}" onclick="copyTextById('secondOut${id}','copySecond${id}')">${COPY_ICON} コピー</button>
        </div>
        <div id="secondOut${id}" class="output-text"></div>
      </div>
    </div>`;
  area.insertBefore(block, area.firstChild);
  document.getElementById('firstOut' + id).textContent = first;
  document.getElementById('secondOut' + id).textContent = second;
  const navRoomClass = isFsjHachiRoom ? 'fsj-hachi' : '';
  addNavItem(parsed.caseNo, parsed.name, extractPref(parsed.address), topRoom, navRoomClass, getHeader(parsed.genre));

  document.getElementById('mailInput').value = '';
  updateCount();
}

function extractPref(address) {
  if (!address) return '';
  for (const p of PREFS_47) { if (address.includes(p)) return p; }

}

function addNavItem(caseNo, name, pref, room, roomClass, genre, genreClass) {
  const list = document.getElementById('navList');
  const item = document.createElement('div');
  item.className = 'nav-item';
  item.dataset.caseno = caseNo;
  item.innerHTML = `
    <button class="nav-btn" onclick="scrollToBlock('${caseNo}')">
      <span class="nav-case">${caseNo}</span>
      ${genre ? `<span class="nav-genre ${genreClass || ''}">${genre}</span>` : ''}
      ${name ? `<span class="nav-name">${name}</span>` : ''}
      ${pref ? `<span class="nav-pref">${pref}</span>` : ''}
      ${room ? `<span class="nav-room ${roomClass || ''}">→ ${room}</span>` : ''}
    </button>
    <button class="nav-delete" onclick="deleteByCaseNo('${caseNo}')" aria-label="削除">✕</button>
  `;
  list.insertBefore(item, list.firstChild);
}

function removeNavItem(caseNo) {
  const item = document.querySelector(`#navList .nav-item[data-caseno="${caseNo}"]`);
  if (item) item.remove();
}

function deleteByCaseNo(caseNo) {
  const block = document.querySelector(`#resultsArea .result-block[data-caseno="${caseNo}"]`);
  if (block) block.remove();
  removeNavItem(caseNo);
  updateCount();
}

function scrollToBlock(caseNo) {
  const block = document.querySelector(`#resultsArea .result-block[data-caseno="${caseNo}"]`);
  if (!block) return;
  block.scrollIntoView({ behavior: 'smooth', block: 'start' });
  selectBlock(block);
}

function selectBlock(block) {
  document.querySelectorAll('#resultsArea .result-block.selected').forEach(b => {
    if (b !== block) b.classList.remove('selected');
  });
  block.classList.add('selected');
}

document.getElementById('resultsArea').addEventListener('click', (e) => {
  const block = e.target.closest('.result-block');
  if (block) selectBlock(block);
});

function showAlert(msg, type) {
  const el = document.getElementById('alertBox');
  el.textContent = msg;
  el.className = `alert alert-${type}`;
  el.style.display = 'block';
}

function resetResults() {
  document.getElementById('resultsArea').innerHTML = '';
  document.getElementById('navList').innerHTML = '';
  document.getElementById('alertBox').style.display = 'none';
  document.getElementById('mailInput').value = '';
  resultCount = 0;
  updateCount();
}

function deleteBlock(btn) {
  const block = btn.closest('.result-block');
  if (block) {
    removeNavItem(block.dataset.caseno);
    block.remove();
  }
  updateCount();
}

// スカイボックス寸法のヘルパー
function getHorizonH() { return window.innerWidth <= 600 ? 36 : 30; }
function skyDims() {
  const sky = document.querySelector('.skybox');
  if (!sky) return { w: 560, h: 100, sky: 64, visibleX: 100 };
  const w = sky.offsetWidth;
  const h = sky.offsetHeight;
  // モバイル: 全画面背景なので左端からOK。 デスクトップ: マスク18%までフェードなのでその外側に出す
  const isMobile = window.innerWidth <= 600;
  const visibleX = isMobile ? 0 : Math.floor(w * 0.18);
  return { w, h, sky: Math.max(h - getHorizonH(), 20), visibleX };
}
function rndPx(max) { return Math.floor(Math.random() * (max / 2)) * 2; }
// 透過フェード外の右側エリアに収まる X 座標
function rndVisibleX(d, width) {
  const margin = 4;
  const room = Math.max(d.w - d.visibleX - width - margin, 20);
  return snapPx(d.visibleX + Math.random() * room);
}

function initSky() {
  // 初期の常駐星は出さない（生成したときだけ星が現れる）
  updateSkyCount();
}

function updateSkyCount() {
  const el = document.getElementById('skyCount');
  if (el) el.textContent = skyCount;
}

function spawnStar() {
  const layer = document.getElementById('skyStars');
  if (!layer) return;
  const d = skyDims();
  const colors = ['', 'c-y', 'c-b', 'c-p'];
  const s = document.createElement('div');
  s.className = 'star-dot ' + colors[Math.floor(Math.random() * colors.length)];
  // フェードの外側（右側の見える範囲）にだけ出す
  s.style.left = rndVisibleX(d, 4) + 'px';
  s.style.top  = snapPx(6 + Math.random() * Math.max(d.sky - 10, 6)) + 'px';
  layer.appendChild(s);
  const all = layer.querySelectorAll('.star-dot');
  if (all.length > 100) all[0].remove();
}

// 2pxグリッド吸着ヘルパー
function snapPx(n) { return Math.floor(n / 2) * 2; }

function createSkyElement(type) {
  const el = document.createElement('div');
  el.className = 'sky-item ev-' + type;
  el.dataset.type = type;
  if (PERSISTENT_TYPES.has(type)) el.classList.add('persistent');
  const d = skyDims();
  const skyH = d.sky; // 夜空エリア高さ（地平線を除く）

  switch (type) {
    case 'moon':
      el.innerHTML = SVG_MOON;
      el.style.left = rndVisibleX(d, 20) + 'px';
      el.style.top  = snapPx(6 + Math.random() * Math.max(skyH - 30, 10)) + 'px';
      break;
    case 'planet':
      el.innerHTML = SVG_PLANET;
      el.style.left = rndVisibleX(d, 20) + 'px';
      el.style.top  = snapPx(10 + Math.random() * Math.max(skyH - 30, 10)) + 'px';
      el.addEventListener('click', onPlanetClick);
      break;
    case 'saturn':
      el.innerHTML = SVG_SATURN;
      el.style.left = rndVisibleX(d, 30) + 'px';
      el.style.top  = snapPx(8 + Math.random() * Math.max(skyH - 30, 10)) + 'px';
      el.addEventListener('click', onSaturnClick);
      break;
    case 'ufo':
      el.innerHTML = SVG_UFO
        + '<div class="ufo-beam-long"></div>'
        + '<div class="ufo-person"><svg viewBox="0 0 4 6" width="4" height="6" shape-rendering="crispEdges">'
        + '<rect x="1" y="0" width="2" height="2" fill="#ffd8a8"/>'
        + '<rect x="0" y="2" width="4" height="2" fill="#6e94c8"/>'
        + '<rect x="1" y="4" width="2" height="2" fill="#2a2030"/>'
        + '</svg></div>';
      el.style.top = snapPx(4 + Math.random() * Math.max(skyH - 50, 8)) + 'px';
      // UFOがホバーする中心位置（skyboxの中央付近）
      el.style.setProperty('--ufo-hover-x', Math.floor(d.w * 0.5) + 'px');
      break;
    case 'shooting':
      el.innerHTML = SVG_SHOOT;
      // 夜空エリアの中央付近を流れる
      el.style.top = snapPx(Math.max(skyH * 0.35, 8) + Math.random() * Math.max(skyH * 0.25, 8)) + 'px';
      break;
    case 'comet':
      el.innerHTML = SVG_COMET;
      el.style.top = snapPx(6 + Math.random() * Math.max(skyH * 0.4, 10)) + 'px';
      el.style.left = '-60px';
      break;
    case 'cloud':
      el.innerHTML = SVG_CLOUD;
      el.style.top = snapPx(Math.max(skyH - 24, 4) + Math.random() * 16) + 'px';
      break;
    case 'bird':
      el.innerHTML = SVG_BIRD;
      el.style.top = snapPx(Math.max(skyH - 30, 4) + Math.random() * 20) + 'px';
      break;
    case 'aurora':
      el.innerHTML = SVG_AURORA;
      break;
    case 'constellation':
      el.innerHTML = SVG_CONSTELLATION;
      el.style.left = rndVisibleX(d, 80) + 'px';
      el.style.top  = snapPx(6 + Math.random() * Math.max(skyH - 50, 4)) + 'px';
      break;
    case 'balloon':
      el.innerHTML = SVG_BALLOON;
      el.style.left = rndVisibleX(d, 20) + 'px';
      break;
    case 'rocket':
      el.innerHTML = SVG_ROCKET;
      el.style.left = rndVisibleX(d, 14) + 'px';
      break;
    case 'satellite':
      el.innerHTML = SVG_SAT;
      el.style.top = snapPx(10 + Math.random() * Math.max(skyH - 20, 10)) + 'px';
      break;
    case 'cat':
      el.innerHTML = SVG_CAT;
      break;
  }
  return el;
}

function triggerFireworks(layer) {
  const colors = ['#ffe88d', '#ff9bc9', '#9ecfff', '#b4ff9e', '#ffb4a0', '#ffd76b', '#ff8fa3', '#c4a8ff', '#7ee8c0'];
  const d = skyDims();
  // 6発の花火を連発（タイミングをずらして）
  for (let k = 0; k < 6; k++) {
    setTimeout(() => {
      const cx = rndVisibleX(d, 6);
      const cy = snapPx(8 + Math.random() * Math.max(d.sky - 20, 10));
      const color = colors[Math.floor(Math.random() * colors.length)];

      // 中心のフラッシュ
      const flash = document.createElement('div');
      flash.className = 'sky-item fw-flash';
      flash.style.left = cx + 'px';
      flash.style.top = cy + 'px';
      flash.style.background = color;
      layer.appendChild(flash);
      setTimeout(() => flash.remove(), 500);

      // メインバースト（20粒）
      const fw = document.createElement('div');
      fw.className = 'sky-item ev-fw';
      fw.style.left = cx + 'px';
      fw.style.top = cy + 'px';
      fw.style.color = color;
      const particles = 20;
      for (let i = 0; i < particles; i++) {
        const p = document.createElement('span');
        const angle = (i / particles) * Math.PI * 2 + Math.random() * 0.15;
        const dist = 24 + Math.floor(Math.random() * 10) * 2;
        p.style.setProperty('--dx', snapPx(Math.cos(angle) * dist) + 'px');
        p.style.setProperty('--dy', snapPx(Math.sin(angle) * dist) + 'px');
        p.style.animationDelay = (Math.random() * 0.08).toFixed(2) + 's';
        fw.appendChild(p);
      }
      layer.appendChild(fw);
      setTimeout(() => fw.remove(), 1500);

      // 二次きらめき（8粒・少し遅れて）
      setTimeout(() => {
        for (let j = 0; j < 10; j++) {
          const sp = document.createElement('div');
          sp.className = 'sky-item fw-sparkle';
          const jitterX = (Math.random() - 0.5) * 40;
          const jitterY = (Math.random() - 0.5) * 40;
          sp.style.left = snapPx(cx + jitterX) + 'px';
          sp.style.top = snapPx(cy + jitterY) + 'px';
          sp.style.background = colors[Math.floor(Math.random() * colors.length)];
          const dx = (Math.random() - 0.5) * 30;
          const dy = 10 + Math.random() * 20;  // 少し下に流れ落ちる
          sp.style.setProperty('--dx', snapPx(dx) + 'px');
          sp.style.setProperty('--dy', snapPx(dy) + 'px');
          sp.style.animationDelay = (Math.random() * 0.3).toFixed(2) + 's';
          layer.appendChild(sp);
          setTimeout(() => sp.remove(), 1800);
        }
      }, 350);
    }, k * 260);
  }
}

function triggerShower(layer) {
  const d = skyDims();
  const baseTop = Math.max(d.sky * 0.35, 8);
  for (let k = 0; k < 4; k++) {
    setTimeout(() => {
      const el = createSkyElement('shooting');
      el.style.top = snapPx(baseTop + Math.random() * Math.max(d.sky * 0.3, 10)) + 'px';
      el.style.left = snapPx(-40 - Math.random() * 60) + 'px';
      layer.appendChild(el);
      setTimeout(() => el.remove(), 1500);
    }, k * 400);
  }
}

function triggerFireflies(layer) {
  const d = skyDims();

// 惑星クリック: 周囲の星を巻き込んで飛んでいく
function onPlanetClick(e) {
  const planet = e.currentTarget;
  if (planet.dataset.flying) return;
  planet.dataset.flying = '1';

  const skybox = document.querySelector('.skybox');
  const sRect = skybox.getBoundingClientRect();
  const pRect = planet.getBoundingClientRect();
  const px = pRect.left - sRect.left + pRect.width / 2;
  const py = pRect.top - sRect.top + pRect.height / 2;

  // 飛んでいく方向（上方向にランダムな角度）
  const dir = Math.random() < 0.5 ? -1 : 1;
  const tx = dir * (220 + Math.random() * 140);
  const ty = -(120 + Math.random() * 60);

  // 近くの星を収集（半径100px以内）
  const dragStars = [];
  document.querySelectorAll('#skyStars .star-dot').forEach(star => {
    const r = star.getBoundingClientRect();
    const sx = r.left - sRect.left + 1;
    const sy = r.top - sRect.top + 1;
    const dx = sx - px;
    const dy = sy - py;
    const dist = Math.hypot(dx, dy);
    if (dist < 110) dragStars.push({ el: star, dist });
  });
  dragStars.sort((a, b) => a.dist - b.dist);

  planet.style.animation = 'none';  // 既存のpop/bobアニメを停止
  planet.style.transition = 'transform 1.6s cubic-bezier(0.32, 0.2, 0.24, 1), opacity 1.8s';
  planet.style.transform = 'translate(' + tx + 'px, ' + ty + 'px) scale(0.3)';
  planet.style.opacity = '0';

  dragStars.forEach((s, i) => {
    const delay = i * 0.04;
    const jitter = 0.85 + Math.random() * 0.25;
    s.el.style.transition = 'transform 1.5s ' + delay + 's cubic-bezier(0.32, 0.2, 0.24, 1), opacity 1.7s ' + delay + 's';
    s.el.style.transform = 'translate(' + (tx * jitter) + 'px, ' + (ty * jitter) + 'px) scale(0.5)';
    s.el.style.opacity = '0';
    setTimeout(() => s.el.remove(), 2000 + i * 40);
  });

  setTimeout(() => planet.remove(), 2000);
}

// 土星クリック: 超ダイナミック爆発 + 衝撃波 + 星を大放出
function onSaturnClick(e) {
  const saturn = e.currentTarget;
  if (saturn.dataset.flying) return;
  saturn.dataset.flying = '1';

  const skybox = document.querySelector('.skybox');
  const sRect = skybox.getBoundingClientRect();
  const pRect = saturn.getBoundingClientRect();
  const cx = pRect.left - sRect.left + pRect.width / 2;
  const cy = pRect.top - sRect.top + pRect.height / 2;

  const layer = document.getElementById('skyEvents');
  const colors = ['#f0dc98', '#c8a868', '#ffe88d', '#ffb463', '#fff', '#dcc396', '#ff6e6e', '#ffd76b', '#ffb463', '#ff9a3c'];

  // Phase 1: 中心の巨大フラッシュ
  const flash = document.createElement('div');
  flash.className = 'sky-item saturn-flash';
  flash.style.left = snapPx(cx) + 'px';
  flash.style.top = snapPx(cy) + 'px';
  layer.appendChild(flash);
  setTimeout(() => flash.remove(), 600);

  // Phase 2: 8方向のショックウェーブ
  for (let i = 0; i < 16; i++) {
    const sp = document.createElement('div');
    sp.className = 'sky-item shock-pixel';
    sp.style.left = snapPx(cx) + 'px';
    sp.style.top = snapPx(cy) + 'px';
    sp.style.background = i % 2 ? '#fff' : '#ffe88d';
    const angle = (i / 16) * Math.PI * 2;
    const dist = 90 + Math.random() * 30;
    sp.style.setProperty('--dx', Math.round(Math.cos(angle) * dist) + 'px');
    sp.style.setProperty('--dy', Math.round(Math.sin(angle) * dist) + 'px');
    layer.appendChild(sp);
    setTimeout(() => sp.remove(), 1000);
  }

  // Phase 3: 3波の大量破片バースト（計90粒）
  for (let w = 0; w < 3; w++) {
    setTimeout(() => {
      const count = 40 - w * 10;
      for (let i = 0; i < count; i++) {
        const shard = document.createElement('div');
        shard.className = 'explosion-shard';
        shard.style.left = snapPx(cx) + 'px';
        shard.style.top = snapPx(cy) + 'px';
        shard.style.background = colors[Math.floor(Math.random() * colors.length)];
        const angle = (i / count + Math.random() * 0.05) * Math.PI * 2;
        const dist = 50 + w * 50 + Math.random() * 80;
        shard.style.setProperty('--dx', Math.round(Math.cos(angle) * dist) + 'px');
        shard.style.setProperty('--dy', Math.round(Math.sin(angle) * dist) + 'px');
        shard.style.animationDuration = (1 + w * 0.2 + Math.random() * 0.4) + 's';
        layer.appendChild(shard);
        setTimeout(() => shard.remove(), 2200);
      }
    }, w * 120);
  }

  // Phase 4: 全ての星を超放射（大きく拡大してから消滅）
  document.querySelectorAll('#skyStars .star-dot').forEach(star => {
    const r = star.getBoundingClientRect();
    const sx = r.left - sRect.left + 1;
    const sy = r.top - sRect.top + 1;
    const dx = sx - cx;
    const dy = sy - cy;
    const dist = Math.hypot(dx, dy) || 1;
    const push = 280 + Math.random() * 180;
    const nx = (dx / dist) * push;
    const ny = (dy / dist) * push;
    star.style.transition = 'transform 1.1s cubic-bezier(0.12, 0.7, 0.3, 1), opacity 1.3s';
    star.style.transform = 'translate(' + Math.round(nx) + 'px, ' + Math.round(ny) + 'px) scale(1.8)';
    star.style.opacity = '0';
    setTimeout(() => star.remove(), 1400);
  });

  // 土星本体: 一瞬巨大化してフェード
  saturn.style.animation = 'none';
  saturn.style.transition = 'transform 0.25s steps(4, end), opacity 0.3s';
  saturn.style.transform = 'scale(3)';
  saturn.style.opacity = '0';
  setTimeout(() => saturn.remove(), 400);
}

function triggerSkyEvent(type) {
  const layer = document.getElementById('skyEvents');
  if (!layer) return;

  // 一時イベントだけフェードアウトして消去（持続は残す）
  Array.from(layer.querySelectorAll('.sky-item:not(.persistent)')).forEach(el => {
    el.style.transition = 'opacity 0.5s steps(5, end)';
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 550);
  });

  // 持続イベント: 同じtypeは1個だけ保持（新しく追加する前に古いのを消す）
  if (PERSISTENT_TYPES.has(type)) {
    const existing = layer.querySelector('.sky-item.persistent[data-type="' + type + '"]');
    if (existing) existing.remove();
  }

  if (type === 'firework')      return triggerFireworks(layer);
  if (type === 'shower')        return triggerShower(layer);
  if (type === 'firefly')       return triggerFireflies(layer);

  const el = createSkyElement(type);
  layer.appendChild(el);

  if (!PERSISTENT_TYPES.has(type)) {
    const dur = TRANSIENT_DURATION[type] || 5000;
    setTimeout(() => el.remove(), dur);
  }
}

function onSkyGenerate() {
  skyCount++;
  spawnStar();
  updateSkyCount();
  if (skyCount % 10 === 0) {
    const idx = ((skyCount / 10) - 1) % SKY_EVENT_ORDER.length;
    triggerSkyEvent(SKY_EVENT_ORDER[idx]);
  }
  saveSkyState();
}

window.addEventListener('DOMContentLoaded', () => {
  loadSkyState();
  initSky();
  const _origGenerate = window.generate;
  window.generate = function() {
    const before = document.querySelectorAll('#resultsArea .result-block').length;
    _origGenerate.apply(this, arguments);
    const after = document.querySelectorAll('#resultsArea .result-block').length;
    if (after > before) onSkyGenerate();
  };
});

function copyTextById(elementId, btnId) {
  const text = document.getElementById(elementId).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    btn.innerHTML = '✓ コピー済み';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = COPY_ICON + ' コピー';
      btn.classList.remove('copied');
    }, 2000);
  });
}
</script>
